<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>시니어 Ai 전문가 자격과정 신청서</title>
<script src="//webapi.adpopcorn.com/offerwall/postback/js/adpopcorn-cpa.1.2.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Noto Sans KR',sans-serif;background:#f5f5f5}
  .wrap{max-width:640px;margin:0 auto;padding:1.5rem 1rem 2rem}
  .logo-bar{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:0.5px solid #ddd}
  .logo-icon{width:40px;height:40px;background:#1565C0;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;flex-shrink:0}
  .logo-text{font-size:18px;font-weight:700;color:#111}
  .logo-text span{color:#1565C0}
  .badge{font-size:11px;background:#E3F2FD;color:#0C447C;border-radius:4px;padding:2px 8px;margin-left:8px}
  .title-bar{text-align:center;margin-bottom:1.5rem}
  .title-bar h1{font-size:20px;font-weight:700;color:#111}
  .title-bar h1 span{color:#1565C0}
  .title-bar p{font-size:12px;color:#888;margin-top:4px}
  .section-title{font-size:13px;font-weight:500;color:#fff;background:#1565C0;padding:7px 14px;border-radius:6px 6px 0 0;margin-top:1.25rem;letter-spacing:0.3px}
  .field-group{border:0.5px solid #ddd;border-top:none;border-radius:0 0 8px 8px;overflow:hidden;margin-bottom:0.25rem;background:#fff}
  .field-row{display:flex;flex-direction:column;padding:12px 14px;border-bottom:0.5px solid #eee;background:#fff}
  .field-row:last-child{border-bottom:none}
  .field-label{font-size:12px;color:#666;margin-bottom:6px}
  .field-row input[type=text],.field-row input[type=tel]{width:100%;border:1px solid #ddd;border-radius:8px;padding:11px 14px;font-size:16px;background:#fafafa;color:#111;outline:none;-webkit-appearance:none}
  .field-row input:focus{border-color:#1565C0;box-shadow:0 0 0 3px rgba(21,101,192,0.1);background:#fff}
  
  .age-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:2px}
  .age-item{display:flex;align-items:center;gap:0;cursor:pointer}
  .age-item input[type=checkbox]{display:none}
  .age-label{display:flex;align-items:center;justify-content:center;width:100%;padding:11px 8px;border:1.5px solid #ddd;border-radius:10px;font-size:14px;color:#555;background:#fafafa;cursor:pointer;transition:all 0.15s;text-align:center;font-weight:400;-webkit-user-select:none;user-select:none}
  .age-item input[type=checkbox]:checked + .age-label{border-color:#1565C0;background:#E3F2FD;color:#1565C0;font-weight:500}

  .course-section{border:0.5px solid #ddd;border-radius:8px;overflow:hidden;margin-top:1.25rem}
  .course-header{background:#E65100;color:#fff;padding:9px 14px;font-size:13px;font-weight:500}
  .course-item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:0.5px solid #eee;background:#fff;cursor:pointer;transition:background 0.12s;-webkit-user-select:none;user-select:none}
  .course-item:last-child{border-bottom:none}
  .course-item input[type=radio]{width:18px;height:18px;margin-top:1px;accent-color:#1565C0;flex-shrink:0;cursor:pointer}
  .course-item label{font-size:14px;color:#111;cursor:pointer;line-height:1.5}
  .course-item label span{font-size:11px;color:#888;display:block;margin-top:2px}
  .course-item.highlighted{background:#FFF8F5}

  .note{font-size:11px;color:#E65100;margin-top:1rem;line-height:1.6;padding:8px 12px;border-left:3px solid #E65100;background:#FFF3E0;border-radius:0 6px 6px 0}
  .privacy-check{display:flex;align-items:flex-start;gap:8px}
  .privacy-check input{width:18px;height:18px;margin-top:2px;accent-color:#1565C0;flex-shrink:0;cursor:pointer}
  .privacy-check label{font-size:13px;color:#111;cursor:pointer;line-height:1.6}
  .submit-btn{width:100%;margin-top:1.5rem;padding:15px;background:#1565C0;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:500;cursor:pointer;letter-spacing:0.3px;transition:background 0.15s;-webkit-appearance:none}
  .submit-btn:active{background:#0D47A1;transform:scale(0.99)}
  .submit-btn:disabled{background:#ccc;cursor:not-allowed}

  .success-msg{display:none;background:#E3F2FD;border:0.5px solid #90CAF9;border-radius:10px;padding:20px;text-align:center;margin-top:1.5rem;color:#0C447C;font-size:15px;line-height:1.8}
  .success-msg b{color:#E65100; font-size:14px; display:block; margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-bar">
    <div class="logo-icon">AI</div>
    <div>
      <div class="logo-text">시니어 <span>Ai</span> 교육진흥원<span class="badge">고용노동부 인가</span></div>
      <div style="font-size:11px;color:#888;margin-top:2px">한국창직협회 부설</div>
    </div>
  </div>

  <div class="title-bar">
    <h1>자격과정 <span>신청서</span></h1>
    <p>2026 시니어 최고 인기 자격 · 시니어 Ai 전문가</p>
  </div>

  <div class="section-title">기본 정보</div>
  <div class="field-group">
    <div class="field-row">
      <div class="field-label">이름 <span style="color:#E53935">*</span></div>
      <input type="text" id="name" placeholder="홍길동">
    </div>
    <div class="field-row">
      <div class="field-label">휴대폰 연락처 <span style="color:#E53935">*</span></div>
      <input type="tel" id="phone" placeholder="010-0000-0000">
    </div>
    <div class="field-row">
      <div class="field-label">연령대 <span style="color:#E53935">*</span></div>
      <div class="age-grid">
        <label class="age-item"><input type="checkbox" name="age" value="40대 미만"><span class="age-label">40대 미만</span></label>
        <label class="age-item"><input type="checkbox" name="age" value="40대"><span class="age-label">40대</span></label>
        <label class="age-item"><input type="checkbox" name="age" value="50대"><span class="age-label">50대</span></label>
        <label class="age-item"><input type="checkbox" name="age" value="60대 이상"><span class="age-label">60대 이상</span></label>
      </div>
    </div>
  </div>

  <div class="course-section">
    <div class="course-header">과정 신청 지역 및 교육 기간 (하나만 선택 가능)</div>
    <div class="course-item"><input type="radio" id="c1" name="course"><label for="c1">서울 5월 12~15일<span>서울 금천구 가산디지털1로 168 A동 306호</span></label></div>
    <div class="course-item"><input type="radio" id="c2" name="course"><label for="c2">서울 5월 18~22일<span>서울 금천구 가산디지털1로 168 A동 306호</span></label></div>
    <div class="course-item highlighted"><input type="radio" id="c7" name="course"><label for="c7">대구 4월 27~29일 ★<span>대구시 동구 동부로174 동대구역인근</span></label></div>
    </div>

  <div class="section-title" style="margin-top:1.25rem">개인정보 수집 및 이용 동의</div>
  <div class="field-group">
    <div class="field-row">
      <div class="privacy-check">
        <input type="checkbox" id="privacy">
        <label for="privacy">본 과정은 유료 자격과정이며, 본인은 이 교육 신청을 위해 개인정보를 수집 이용하는 것에 동의합니다.</label>
      </div>
    </div>
  </div>

  <button class="submit-btn" onclick="handleSubmit()">신청서 제출</button>
  
  <div class="success-msg" id="success-msg">
    🎉 신청이 완료되었습니다!<br>
    <b>교육 담당자가 교육 상담 전화를 드립니다. 참고하세요.</b>
  </div>
</div>

<script>
// 1. [핵심] 페이지 접속 시 URL에서 tid와 campaignkey를 미리 챙겨둡니다.
const urlParams = new URLSearchParams(window.location.search);
const tid = urlParams.get('tid');
const campaignkey = urlParams.get('campaignkey');

document.querySelectorAll('.course-item').forEach(item => {
  item.addEventListener('click', function(e) {
    if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'LABEL') {
      const rb = this.querySelector('input[type=radio]');
      rb.checked = true;
    }
  });
});

function handleSubmit() {
  const name = document.getElementById('name').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const ages = [...document.querySelectorAll('input[name=age]:checked')].map(a => a.value).join(', ');
  const selectedCourse = document.querySelector('input[name=course]:checked');
  const courseName = selectedCourse ? selectedCourse.nextElementSibling.childNodes[0].textContent.trim() : "";
  const privacy = document.getElementById('privacy').checked;

  if(!name || !phone || !ages || !courseName || !privacy){
    alert('모든 항목을 입력하고 동의해주세요.');
    return;
  }

  const submitBtn = document.querySelector('.submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = '처리 중...';

  // [본인의 구글 URL로 꼭 변경하세요]
  const scriptUrl = 'https://script.google.com/macros/s/AKfycbwFtusnkE6PVJuxAHAKQTFm3feZz2g6cDKd7Myi1w3MltKhKwhg09Zp-4499XsdoLZ-mQ/exec';

  // 1. 구글 시트로 데이터 전송 (tid 정보도 함께 보내주면 나중에 대조하기 좋습니다)
  fetch(scriptUrl, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ name, phone, age: ages, course: courseName, tid: tid })
  })
  .then(() => {
    // 2. 구글 전송 후 애드팝콘 콜백 호출 (방식 2 적용)
    if(typeof AdPopcorn !== 'undefined') {
      // 애드팝콘 서버에 완료 신호를 보냅니다.
      AdPopcorn.cpaCompleted(function() {
        showSuccessUI(); // 콜백을 받은 후 UI를 바꿉니다.
      });
      
      // 만약 애드팝콘 서버 응답이 너무 느릴 경우를 대비해 1.5초 후 강제 완료 처리
      setTimeout(() => showSuccessUI(), 1500);
    } else {
      showSuccessUI();
    }
  })
  .catch(err => {
    showSuccessUI();
  });
}

function showSuccessUI() {
  const submitBtn = document.querySelector('.submit-btn');
  submitBtn.style.background = '#90CAF9';
  submitBtn.textContent = '제출 완료';
  document.getElementById('success-msg').style.display = 'block';
  document.getElementById('success-msg').scrollIntoView({behavior:'smooth',block:'nearest'});
}
</script>
</body>
</html>
